version: '3.8'

services:
  tg-bot-parser:
    build: .
    container_name: tg-bot-parser
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Mount session file (must be created first with: npm run auth)
      - ./session.json:/app/session.json:ro
      # Mount environment file
      - ./.env:/app/.env:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
